<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenotazione Dolci Solidali - WonderLAD</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;750&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6b9080;
            --primary-dark: #4d6a5b;
            --accent-soft: #a4c3b2;
            --accent-light: #eaf4f0;
            --bg-main: #f6fff8;
            --card-bg: #ffffff;
            --text-main: #2c3e35;
            --text-muted: #6b7c73;
            --border-color: #e2ece9;
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: var(--bg-main); 
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            margin: 0;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .header-bar {
            width: 100%;
            background-color: var(--card-bg);
            padding: 1.2rem 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            box-shadow: 0 4px 15px rgba(107, 144, 128, 0.05);
            margin-bottom: 2rem;
        }

        .header-bar img {
            max-height: 48px;
            width: auto;
        }

        .form-container {
            background: var(--card-bg);
            max-width: 450px;
            width: 90%;
            padding: 2.5rem 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(107, 144, 128, 0.08);
            border: 2px solid var(--border-color);
            box-sizing: border-box;
            margin-bottom: 2rem;
        }

        h2 { 
            text-align: center; 
            color: var(--primary); 
            margin-top: 0; 
            font-weight: 750; 
            font-size: 1.8rem; 
            margin-bottom: 0.3rem; 
            font-family: 'Quicksand', sans-serif; 
        }
        
        .subtitle { 
            text-align: center; 
            color: var(--text-muted); 
            font-size: 0.95rem; 
            margin-bottom: 2rem; 
            font-weight: 600; 
        }

        input[type="text"], input[type="tel"] { 
            width: 100%; 
            margin-bottom: 1.2rem; 
            padding: 0.9rem 1rem; 
            border: 2px solid var(--border-color);
            border-radius: 14px; 
            box-sizing: border-box; 
            font-family: 'Nunito', sans-serif;
            font-size: 1rem; 
            transition: all 0.3s ease; 
            background-color: #fbfdfe; 
            color: var(--text-main);
        }

        input:focus { 
            outline: none; 
            border-color: var(--primary); 
            background-color: #ffffff; 
            box-shadow: 0 0 0 4px rgba(107, 144, 128, 0.12); 
        }

        .product-selector { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background-color: var(--accent-light); 
            border: 2px solid var(--border-color); 
            border-radius: 16px; 
            padding: 1rem; 
            margin-bottom: 1.2rem; 
        }

        .product-name { font-weight: 750; font-size: 1.1rem; color: var(--primary-dark); font-family: 'Quicksand', sans-serif; }
        .counter-group { display: flex; align-items: center; gap: 15px; }

        .btn-counter { 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            width: 38px; 
            height: 38px; 
            border-radius: 50%; 
            font-size: 1.3rem; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            transition: background-color 0.2s, transform 0.1s; 
        }
        .btn-counter:hover { background-color: var(--primary-dark); transform: scale(1.05); }
        .btn-counter:active { transform: scale(0.95); }
        .count-display { font-size: 1.2rem; font-weight: 800; width: 25px; text-align: center; color: var(--text-main); }

        button[type="submit"] { 
            width: 100%; 
            padding: 1.1rem; 
            background-color: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 14px; 
            font-size: 1.15rem; 
            font-weight: 800; 
            cursor: pointer; 
            transition: background-color 0.3s, transform 0.1s; 
            font-family: 'Quicksand', sans-serif; 
            margin-top: 0.5rem; 
            box-shadow: 0 4px 12px rgba(107, 144, 128, 0.25); 
        }
        button[type="submit"]:hover { 
            background-color: var(--primary-dark); 
            transform: translateY(-2px); 
        }

        #statusMsg { font-weight: bold; text-align: center; margin-bottom: 1rem; min-height: 1.5rem; font-size: 1.05rem; font-family: 'Quicksand', sans-serif; }
        #contatoreOrdini { font-size: 0.85em; color: var(--text-muted); text-align: center; margin-bottom: 1.5rem; font-weight: 700; }
        
        .test-btn { 
            background-color: transparent; 
            color: var(--text-muted); 
            border: 2px dashed var(--border-color); 
            padding: 0.8rem; 
            border-radius: 14px; 
            cursor: pointer; 
            font-family: 'Quicksand', sans-serif; 
            font-weight: 700; 
            width: 90%; 
            max-width: 450px; 
            box-sizing: border-box; 
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <img src="https://www.wonderlad.org/wp-content/uploads/2020/05/logo-wonderlad.png" alt="WonderLAD Logo" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'180\' height=\'40\' viewBox=\'0 0 180 40\'><text x=\'10\' y=\'28\' fill=\'%236b9080\' font-family=\'Quicksand\' font-size=\'22\' font-weight=\'bold\'>WonderLAD</text></svg>'">
    </div>

    <div class="form-container">
        <h2>Prenota i tuoi Dolci</h2>
        <div class="subtitle">Sostieni i nostri progetti con dolcezza</div>
        
        <div id="statusMsg"></div>
        <div id="contatoreOrdini">Ordini registrati in questa sessione: 0</div>

        <form id="ordineForm">
            <input type="text" id="nome" placeholder="Nome" required>
            <input type="text" id="cognome" placeholder="Cognome" required>
            
            <!-- Campo Telefono Forzato solo per Cifre Numeriche -->
            <input 
                type="tel" 
                id="telefono" 
                placeholder="Numero di Telefono" 
                inputmode="numeric" 
                pattern="[0-9]+" 
                oninput="this.value = this.value.replace(/[^0-9]/g, '')" 
                required>
            
            <div class="product-selector">
                <span class="product-name">Panettoni</span>
                <div class="counter-group">
                    <button type="button" class="btn-counter" onclick="updateCount('panettoni', -1)">-</button>
                    <span id="panettoni-display" class="count-display">0</span>
                    <button type="button" class="btn-counter" onclick="updateCount('panettoni', 1)">+</button>
                </div>
            </div>

            <div class="product-selector">
                <span class="product-name">Pandori</span>
                <div class="counter-group">
                    <button type="button" class="btn-counter" onclick="updateCount('pandori', -1)">-</button>
                    <span id="pandori-display" class="count-display">0</span>
                    <button type="button" class="btn-counter" onclick="updateCount('pandori', 1)">+</button>
                </div>
            </div>

            <button type="submit">Conferma Prenotazione</button>
        </form>
    </div>

    <button class="test-btn" onclick="eseguiTest()">⚙️ Esegui Test Inserimento Dati</button>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxX62PXj7nrrHyv2xI3g2TxPnxw6Db2I2W_x-5mEghc_8dHQvUiIGvwm4PTmY8RIQy0Vw/exec';
        let counterOrdini = 0; 
        let countPanettoni = 0; 
        let countPandori = 0;

        function updateCount(prodotto, valore) {
            if (prodotto === 'panettoni') {
                countPanettoni += valore;
                if (countPanettoni < 0) countPanettoni = 0;
                document.getElementById('panettoni-display').textContent = countPanettoni;
            } else if (prodotto === 'pandori') {
                countPandori += valore;
                if (countPandori < 0) countPandori = 0;
                document.getElementById('pandori-display').textContent = countPandori;
            }
        }

        function eseguiTest() {
            document.getElementById('nome').value = "TestNome";
            document.getElementById('cognome').value = "TestCognome";
            document.getElementById('telefono').value = "3331234567";
            countPanettoni = 2; 
            countPandori = 1;
            document.getElementById('panettoni-display').textContent = countPanettoni;
            document.getElementById('pandori-display').textContent = countPandori;
            document.getElementById('ordineForm').dispatchEvent(new Event('submit', { cancelable: true }));
        }
        
        document.getElementById('ordineForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const msg = document.getElementById('statusMsg');
            
            if (countPanettoni === 0 && countPandori === 0) {
                msg.textContent = "Seleziona almeno un Panettone o un Pandoro.";
                msg.style.color = "#d9534f";
                return;
            }

            const btn = this.querySelector('button[type="submit"]');
            btn.disabled = true; 
            btn.textContent = "Attendere..."; 
            msg.textContent = "";
            
            const data = {
                action: 'insert',
                nome: document.getElementById('nome').value,
                cognome: document.getElementById('cognome').value,
                telefono: document.getElementById('telefono').value,
                panettoni: countPanettoni,
                pandori: countPandori
            };

            fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if(result.status === "success") {
                    msg.textContent = "Prenotazione confermata con successo! 🎉"; 
                    msg.style.color = "#6b9080";
                    document.getElementById('ordineForm').reset();
                    countPanettoni = 0; 
                    countPandori = 0;
                    document.getElementById('panettoni-display').textContent = "0";
                    document.getElementById('pandori-display').textContent = "0";
                    counterOrdini++;
                    document.getElementById('contatoreOrdini').textContent = `Ordini registrati in questa sessione: ${counterOrdini}`;
                } else { 
                    throw new Error("Errore backend"); 
                }
            })
            .catch(error => {
                msg.textContent = "Si è verificato un errore. Riprova."; 
                msg.style.color = "#d9534f";
            })
            .finally(() => {
                btn.disabled = false; 
                btn.textContent = "Conferma Prenotazione";
            });
        });
    </script>
</body>
</html>
