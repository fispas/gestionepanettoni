<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prenotazione Panettoni e Pandori - WonderLAD</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: #f4f6f8; 
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
            margin: 0;
        }
        
        .form-container {
            background: #ffffff;
            max-width: 450px;
            width: 100%;
            padding: 2.5rem 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border-top: 8px solid #e53935; 
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            font-weight: 800;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        input[type="text"], input[type="tel"] { 
            width: 100%; 
            margin-bottom: 1.2rem; 
            padding: 0.9rem 1rem; 
            border: 2px solid #e9ecef;
            border-radius: 10px;
            box-sizing: border-box; 
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #f8f9fa;
        }

        input:focus {
            outline: none;
            border-color: #fbbc05; 
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(251, 188, 5, 0.1);
        }

        /* Stili per i selettori di quantità */
        .product-selector {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 1.2rem;
        }

        .product-info {
            display: flex;
            flex-direction: column;
        }

        .product-name {
            font-weight: 700;
            font-size: 1.1rem;
            color: #2c3e50;
        }

        .counter-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-counter {
            background-color: #e53935;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-counter:hover {
            background-color: #c62828;
            transform: scale(1.05);
        }
        
        .btn-counter:active {
            transform: scale(0.95);
        }

        .count-display {
            font-size: 1.2rem;
            font-weight: 800;
            width: 20px;
            text-align: center;
        }

        button[type="submit"] { 
            width: 100%; 
            padding: 1.1rem; 
            background-color: #e53935; 
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            font-family: 'Nunito', sans-serif;
            margin-top: 0.5rem;
            box-shadow: 0 4px 6px rgba(229, 57, 53, 0.2);
        }

        button[type="submit"]:hover {
            background-color: #c62828;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(229, 57, 53, 0.3);
        }

        #statusMsg { 
            font-weight: bold; 
            text-align: center;
            margin-bottom: 1rem; 
            min-height: 1.5rem;
            font-size: 1.1rem;
        }

        #contatoreOrdini { 
            font-size: 0.9em; 
            color: #95a5a6; 
            text-align: center;
            margin-bottom: 1.5rem;
            font-weight: 700;
        }

        .test-btn { 
            background-color: transparent; 
            color: #adb5bd;
            margin-top: 2rem; 
            border: 2px dashed #dee2e6; 
            padding: 0.8rem;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            transition: all 0.3s;
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
        }

        .test-btn:hover {
            background-color: #e9ecef;
            color: #495057;
            border-color: #adb5bd;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Prenota i tuoi Dolci</h2>
        <div class="subtitle">Sostieni i nostri progetti con dolcezza</div>
        
        <div id="statusMsg"></div>
        <div id="contatoreOrdini">Ordini registrati in questa sessione: 0</div>

        <form id="ordineForm">
            <input type="text" id="nome" placeholder="Nome" required>
            <input type="text" id="cognome" placeholder="Cognome" required>
            <input type="tel" id="telefono" placeholder="Numero di Telefono" required>
            
            <div class="product-selector">
                <div class="product-info">
                    <span class="product-name">Panettoni</span>
                </div>
                <div class="counter-group">
                    <button type="button" class="btn-counter" onclick="updateCount('panettoni', -1)">-</button>
                    <span id="panettoni-display" class="count-display">0</span>
                    <button type="button" class="btn-counter" onclick="updateCount('panettoni', 1)">+</button>
                </div>
            </div>

            <div class="product-selector">
                <div class="product-info">
                    <span class="product-name">Pandori</span>
                </div>
                <div class="counter-group">
                    <button type="button" class="btn-counter" onclick="updateCount('pandori', -1)">-</button>
                    <span id="pandori-display" class="count-display">0</span>
                    <button type="button" class="btn-counter" onclick="updateCount('pandori', 1)">+</button>
                </div>
            </div>

            <button type="submit">Conferma Prenotazione</button>
        </form>
    </div>

    <!-- Pulsante di test aggiornato con le nuove variabili -->
    <button class="test-btn" onclick="eseguiTest()">⚙️ Esegui Test Inserimento Dati</button>

    <script>
        let counterOrdini = 0;
        let countPanettoni = 0;
        let countPandori = 0;

        function updateCount(prodotto, valore) {
            if (prodotto === 'panettoni') {
                countPanettoni += valore;
                if (countPanettoni < 0) countPanettoni = 0;
                document.getElementById('panettoni-display').textContent = countPanettoni;
            } else if (prodotto === 'pandori') {
                countPandori += valore;
                if (countPandori < 0) countPandori = 0;
                document.getElementById('pandori-display').textContent = countPandori;
            }
        }

        function eseguiTest() {
            document.getElementById('nome').value = "TestNome";
            document.getElementById('cognome').value = "TestCognome";
            document.getElementById('telefono').value = "3331234567";
            countPanettoni = 2;
            countPandori = 1;
            document.getElementById('panettoni-display').textContent = countPanettoni;
            document.getElementById('pandori-display').textContent = countPandori;
            
            document.getElementById('ordineForm').dispatchEvent(new Event('submit', { cancelable: true }));
        }
        
        document.getElementById('ordineForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const msg = document.getElementById('statusMsg');
            
            // Controllo che ci sia almeno un prodotto selezionato
            if (countPanettoni === 0 && countPandori === 0) {
                msg.textContent = "Seleziona almeno un Panettone o un Pandoro.";
                msg.style.color = "#e74c3c";
                return;
            }

            const btn = this.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = "Attendere...";
            msg.textContent = "";
            
            // INSERITO IL TUO NUOVO URL DEFINITIVO
            const url = 'https://script.google.com/macros/s/AKfycbw7kxXSV8ds8zPG7fFsJ08U9PEwuwpJ6swgNmIOjoG-V47Upq3FYg9gQIZU_yIANyNxKQ/exec'; 
            
            const data = {
                nome: document.getElementById('nome').value,
                cognome: document.getElementById('cognome').value,
                telefono: document.getElementById('telefono').value,
                panettoni: countPanettoni,
                pandori: countPandori
            };

            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8',
                },
                body: JSON.stringify(data)
            })
            .then(response => response.json())
            .then(result => {
                if(result.status === "success") {
                    msg.textContent = "Prenotazione confermata con successo! 🎉";
                    msg.style.color = "#2ecc71";
                    
                    // Reset del form e dei contatori
                    document.getElementById('ordineForm').reset();
                    countPanettoni = 0;
                    countPandori = 0;
                    document.getElementById('panettoni-display').textContent = "0";
                    document.getElementById('pandori-display').textContent = "0";
                    
                    counterOrdini++;
                    document.getElementById('contatoreOrdini').textContent = `Ordini registrati in questa sessione: ${counterOrdini}`;
                } else {
                    throw new Error("Errore backend");
                }
            })
            .catch(error => {
                msg.textContent = "Si è verificato un errore. Riprova.";
                msg.style.color = "#e74c3c";
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = "Conferma Prenotazione";
            });
        });
    </script>
</body>
</html>
